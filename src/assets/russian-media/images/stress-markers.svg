<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Russian stress markers visual guide</title>
  <desc id="desc">Visual guide showing word stress patterns with syllable breakdown and clapping cues.</desc>
  
  <defs>
    <linearGradient id="darkBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  
  <rect width="960" height="540" fill="url(#darkBg)"/>
  
  <!-- Title -->
  <text x="480" y="42" fill="#f8fafc" font-size="28" font-family="Arial" text-anchor="middle" font-weight="bold">👏 Ударение — Word Stress</text>
  <text x="480" y="66" fill="#94a3b8" font-size="16" font-family="Arial" text-anchor="middle">Clap on the stressed syllable · Хлопни на ударном слоге</text>
  
  <!-- Word 1: молоко́ -->
  <rect x="40" y="90" width="880" height="110" rx="16" fill="#111827" stroke="#06b6d4" stroke-width="2"/>
  <text x="70" y="130" fill="#67e8f9" font-size="20" font-family="Arial" font-weight="bold">1</text>
  
  <!-- Syllable boxes -->
  <rect x="110" y="105" width="90" height="70" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="155" y="150" fill="#cbd5e1" font-size="32" font-family="Arial" text-anchor="middle">мо</text>
  
  <rect x="220" y="105" width="90" height="70" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="265" y="150" fill="#cbd5e1" font-size="32" font-family="Arial" text-anchor="middle">ло</text>
  
  <rect x="330" y="100" width="100" height="80" rx="10" fill="#06b6d4" stroke="#22d3ee" stroke-width="2"/>
  <text x="380" y="150" fill="white" font-size="36" font-family="Arial" text-anchor="middle" font-weight="bold">ко́</text>
  <text x="380" y="175" fill="#cffafe" font-size="12" font-family="Arial" text-anchor="middle">STRESS</text>
  
  <text x="500" y="140" fill="#94a3b8" font-size="22" font-family="Arial">→</text>
  <text x="540" y="140" fill="#e2e8f0" font-size="26" font-family="Arial">молоко́</text>
  <text x="540" y="168" fill="#64748b" font-size="16" font-family="Arial">milk · 👏👏👏</text>
  <text x="750" y="148" fill="#22d3ee" font-size="38">🥛</text>
  
  <!-- Word 2: окно́ -->
  <rect x="40" y="215" width="880" height="110" rx="16" fill="#111827" stroke="#a78bfa" stroke-width="2"/>
  <text x="70" y="255" fill="#c4b5fd" font-size="20" font-family="Arial" font-weight="bold">2</text>
  
  <rect x="110" y="230" width="90" height="70" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="155" y="275" fill="#cbd5e1" font-size="32" font-family="Arial" text-anchor="middle">ок</text>
  
  <rect x="220" y="225" width="100" height="80" rx="10" fill="#8b5cf6" stroke="#a78bfa" stroke-width="2"/>
  <text x="270" y="275" fill="white" font-size="36" font-family="Arial" text-anchor="middle" font-weight="bold">но́</text>
  <text x="270" y="300" fill="#e9d5ff" font-size="12" font-family="Arial" text-anchor="middle">STRESS</text>
  
  <text x="390" y="265" fill="#94a3b8" font-size="22" font-family="Arial">→</text>
  <text x="430" y="265" fill="#e2e8f0" font-size="26" font-family="Arial">окно́</text>
  <text x="430" y="293" fill="#64748b" font-size="16" font-family="Arial">window · 👏👏</text>
  <text x="750" y="273" fill="#a78bfa" font-size="38">🪟</text>
  
  <!-- Word 3: ко́мната -->
  <rect x="40" y="340" width="880" height="110" rx="16" fill="#111827" stroke="#f59e0b" stroke-width="2"/>
  <text x="70" y="380" fill="#fbbf24" font-size="20" font-family="Arial" font-weight="bold">3</text>
  
  <rect x="110" y="345" width="100" height="80" rx="10" fill="#d97706" stroke="#f59e0b" stroke-width="2"/>
  <text x="160" y="395" fill="white" font-size="36" font-family="Arial" text-anchor="middle" font-weight="bold">ко́м</text>
  <text x="160" y="420" fill="#fef3c7" font-size="12" font-family="Arial" text-anchor="middle">STRESS</text>
  
  <rect x="230" y="350" width="80" height="70" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="270" y="395" fill="#cbd5e1" font-size="32" font-family="Arial" text-anchor="middle">на</text>
  
  <rect x="330" y="350" width="80" height="70" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="370" y="395" fill="#cbd5e1" font-size="32" font-family="Arial" text-anchor="middle">та</text>
  
  <text x="470" y="385" fill="#94a3b8" font-size="22" font-family="Arial">→</text>
  <text x="510" y="385" fill="#e2e8f0" font-size="26" font-family="Arial">ко́мната</text>
  <text x="510" y="413" fill="#64748b" font-size="16" font-family="Arial">room · 👏👏👏</text>
  <text x="750" y="393" fill="#f59e0b" font-size="38">🚪</text>
  
  <!-- Rule box -->
  <rect x="40" y="468" width="880" height="56" rx="14" fill="#111827" stroke="#475569"/>
  <text x="480" y="492" fill="#94a3b8" font-size="16" font-family="Arial" text-anchor="middle">📌 В русском ударение свободное — оно может быть на любом слоге!</text>
  <text x="480" y="514" fill="#64748b" font-size="14" font-family="Arial" text-anchor="middle">Russian stress is free — it can fall on any syllable! Always learn the stress with the word.</text>
</svg>