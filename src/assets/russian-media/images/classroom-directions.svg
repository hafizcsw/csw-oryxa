<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Russian classroom location map</title>
  <desc id="desc">Interactive-style classroom map showing labeled objects with preposition examples.</desc>
  
  <rect width="960" height="540" fill="#ecfeff"/>
  
  <!-- Title -->
  <text x="480" y="38" font-size="24" font-family="Arial" fill="#0f172a" text-anchor="middle" font-weight="bold">🏫 Карта класса — Classroom Map</text>
  
  <!-- Classroom boundary -->
  <rect x="30" y="55" width="900" height="370" rx="20" fill="#ffffff" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="480" y="78" fill="#94a3b8" font-size="14" font-family="Arial" text-anchor="middle">— Класс / Classroom —</text>
  
  <!-- Board (доска) -->
  <rect x="180" y="95" width="600" height="60" rx="8" fill="#1e293b" stroke="#0f172a" stroke-width="3"/>
  <text x="480" y="133" fill="#86efac" font-size="22" font-family="Arial" text-anchor="middle">📋 ДОСКА · board</text>
  <rect x="200" y="102" width="560" height="4" fill="#475569"/>
  
  <!-- Map on board -->
  <rect x="700" y="100" width="50" height="45" rx="4" fill="#bfdbfe" stroke="#3b82f6" stroke-width="2"/>
  <text x="725" y="128" fill="#1d4ed8" font-size="11" font-family="Arial" text-anchor="middle">карта</text>
  
  <!-- Teacher desk -->
  <rect x="380" y="175" width="200" height="50" rx="10" fill="#fde68a" stroke="#ca8a04" stroke-width="2"/>
  <text x="480" y="207" fill="#78350f" font-size="18" font-family="Arial" text-anchor="middle">🧑‍🏫 стол учителя</text>
  
  <!-- Student desks -->
  <g>
    <rect x="100" y="260" width="130" height="50" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="165" y="291" fill="#0c4a6e" font-size="15" font-family="Arial" text-anchor="middle">📖 стол</text>
    
    <rect x="280" y="260" width="130" height="50" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="345" y="291" fill="#0c4a6e" font-size="15" font-family="Arial" text-anchor="middle">📖 стол</text>
    
    <rect x="550" y="260" width="130" height="50" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="615" y="291" fill="#0c4a6e" font-size="15" font-family="Arial" text-anchor="middle">📖 стол</text>
    
    <rect x="730" y="260" width="130" height="50" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="795" y="291" fill="#0c4a6e" font-size="15" font-family="Arial" text-anchor="middle">📖 стол</text>
  </g>
  
  <!-- Students -->
  <g font-family="Arial" font-size="13" fill="#334155">
    <text x="165" y="340" text-anchor="middle">👩‍🎓 студент</text>
    <text x="345" y="340" text-anchor="middle">👨‍🎓 студент</text>
    <text x="615" y="340" text-anchor="middle">👩‍🎓 студентка</text>
    <text x="795" y="340" text-anchor="middle">👨‍🎓 студент</text>
  </g>
  
  <!-- Book on desk -->
  <rect x="120" y="265" width="30" height="22" rx="3" fill="#fbbf24" stroke="#92400e"/>
  <text x="135" y="282" fill="#451a03" font-size="9" font-family="Arial" text-anchor="middle">📕</text>
  
  <!-- Door -->
  <rect x="870" y="160" width="50" height="120" rx="6" fill="#fecaca" stroke="#dc2626" stroke-width="2"/>
  <circle cx="880" cy="220" r="5" fill="#b91c1c"/>
  <text x="895" y="230" fill="#7f1d1d" font-size="14" font-family="Arial" text-anchor="middle" writing-mode="tb">дверь</text>
  
  <!-- Window -->
  <rect x="42" y="160" width="40" height="100" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <line x1="62" y1="160" x2="62" y2="260" stroke="#93c5fd"/>
  <line x1="42" y1="210" x2="82" y2="210" stroke="#93c5fd"/>
  <text x="62" y="280" fill="#1d4ed8" font-size="13" font-family="Arial" text-anchor="middle">окно</text>
  
  <!-- Preposition examples -->
  <rect x="30" y="435" width="900" height="90" rx="14" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="480" y="460" fill="#166534" font-size="18" font-family="Arial" text-anchor="middle" font-weight="bold">📍 Предлоги — Prepositions</text>
  
  <g font-family="Arial" font-size="17">
    <text x="90" y="488" fill="#334155">📖 Кни́га</text><text x="180" y="488" fill="#dc2626" font-weight="bold">на</text><text x="210" y="488" fill="#334155">столé</text>
    <text x="310" y="488" fill="#64748b">book ON the desk</text>
    
    <text x="90" y="514" fill="#334155">🗺 Ка́рта</text><text x="180" y="514" fill="#dc2626" font-weight="bold">на</text><text x="210" y="514" fill="#334155">доскé</text>
    <text x="310" y="514" fill="#64748b">map ON the board</text>
    
    <text x="530" y="488" fill="#334155">👩‍🎓 Студéнты</text><text x="660" y="488" fill="#2563eb" font-weight="bold">в</text><text x="680" y="488" fill="#334155">аудитóрии</text>
    <text x="800" y="488" fill="#64748b">students IN class</text>
    
    <text x="530" y="514" fill="#334155">👨‍🎓 Студéнт</text><text x="650" y="514" fill="#16a34a" font-weight="bold">у</text><text x="670" y="514" fill="#334155">двéри</text>
    <text x="800" y="514" fill="#64748b">student BY the door</text>
  </g>
</svg>