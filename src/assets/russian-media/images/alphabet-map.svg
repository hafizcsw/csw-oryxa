<svg xmlns="http://www.w3.org/2000/svg" width="960" height="1400" viewBox="0 0 960 1400" role="img" aria-labelledby="title desc">
  <title id="title">Полный алфавит кириллицы — Complete Cyrillic Alphabet</title>
  <desc id="desc">All 33 Russian letters organized by type with pronunciation guides and example words.</desc>
  
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1222"/>
      <stop offset="100%" stop-color="#162033"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="vowelGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="consGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="signGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>
  <rect width="960" height="1400" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="480" y="50" fill="#f1f5f9" font-size="32" font-family="Arial, sans-serif" text-anchor="middle" font-weight="bold">🔤 Русский алфавит — 33 буквы</text>
  <text x="480" y="78" fill="#94a3b8" font-size="16" font-family="Arial" text-anchor="middle">Russian Alphabet — 33 Letters</text>

  <!-- Legend -->
  <rect x="220" y="95" width="18" height="18" rx="4" fill="url(#vowelGrad)"/>
  <text x="245" y="110" fill="#93c5fd" font-size="14" font-family="Arial">Гласные / Vowels (10)</text>
  <rect x="430" y="95" width="18" height="18" rx="4" fill="url(#consGrad)"/>
  <text x="455" y="110" fill="#86efac" font-size="14" font-family="Arial">Согласные / Consonants (21)</text>
  <rect x="670" y="95" width="18" height="18" rx="4" fill="url(#signGrad)"/>
  <text x="695" y="110" fill="#fbbf24" font-size="14" font-family="Arial">Знаки / Signs (2)</text>

  <!-- VOWELS SECTION -->
  <rect x="30" y="130" width="900" height="330" rx="16" fill="#111827" stroke="#3b82f6" stroke-width="1.5" opacity="0.9"/>
  <text x="480" y="162" fill="#93c5fd" font-size="20" font-family="Arial" text-anchor="middle" font-weight="bold">Гласные — Vowels</text>

  <!-- Row 1: А Э О У Ы -->
  <g font-family="Arial">
    <!-- А -->
    <rect x="60" y="180" width="155" height="56" rx="10" fill="url(#vowelGrad)" opacity="0.85"/>
    <text x="95" y="216" fill="white" font-size="30" text-anchor="middle" font-weight="bold">А а</text>
    <text x="130" y="207" fill="#e0e7ff" font-size="14">/a/</text>
    <text x="130" y="225" fill="#cbd5e1" font-size="13">мáма</text>
    
    <!-- Э -->
    <rect x="230" y="180" width="155" height="56" rx="10" fill="url(#vowelGrad)" opacity="0.85"/>
    <text x="265" y="216" fill="white" font-size="30" text-anchor="middle" font-weight="bold">Э э</text>
    <text x="300" y="207" fill="#e0e7ff" font-size="14">/e/</text>
    <text x="300" y="225" fill="#cbd5e1" font-size="13">это</text>

    <!-- О -->
    <rect x="400" y="180" width="155" height="56" rx="10" fill="url(#vowelGrad)" opacity="0.85"/>
    <text x="435" y="216" fill="white" font-size="30" text-anchor="middle" font-weight="bold">О о</text>
    <text x="470" y="207" fill="#e0e7ff" font-size="14">/o/</text>
    <text x="470" y="225" fill="#cbd5e1" font-size="13">дом</text>

    <!-- У -->
    <rect x="570" y="180" width="155" height="56" rx="10" fill="url(#vowelGrad)" opacity="0.85"/>
    <text x="605" y="216" fill="white" font-size="30" text-anchor="middle" font-weight="bold">У у</text>
    <text x="640" y="207" fill="#e0e7ff" font-size="14">/u/</text>
    <text x="640" y="225" fill="#cbd5e1" font-size="13">тут</text>

    <!-- Ы -->
    <rect x="740" y="180" width="155" height="56" rx="10" fill="url(#vowelGrad)" opacity="0.85"/>
    <text x="775" y="216" fill="white" font-size="30" text-anchor="middle" font-weight="bold">Ы ы</text>
    <text x="810" y="207" fill="#e0e7ff" font-size="14">/ɨ/</text>
    <text x="810" y="225" fill="#cbd5e1" font-size="13">мы</text>
  </g>

  <!-- Row 2: Я Е Ё Ю И -->
  <g font-family="Arial">
    <text x="480" y="265" fill="#64748b" font-size="13" text-anchor="middle">↓ Йотированные (смягчающие) / Iotated (softening)</text>
    
    <rect x="60" y="278" width="155" height="56" rx="10" fill="#4f46e5" opacity="0.7"/>
    <text x="95" y="314" fill="white" font-size="30" text-anchor="middle" font-weight="bold">Я я</text>
    <text x="130" y="305" fill="#e0e7ff" font-size="14">/ja/</text>
    <text x="130" y="323" fill="#cbd5e1" font-size="13">яблоко</text>

    <rect x="230" y="278" width="155" height="56" rx="10" fill="#4f46e5" opacity="0.7"/>
    <text x="265" y="314" fill="white" font-size="30" text-anchor="middle" font-weight="bold">Е е</text>
    <text x="300" y="305" fill="#e0e7ff" font-size="14">/je/</text>
    <text x="300" y="323" fill="#cbd5e1" font-size="13">нет</text>

    <rect x="400" y="278" width="155" height="56" rx="10" fill="#4f46e5" opacity="0.7"/>
    <text x="435" y="314" fill="white" font-size="30" text-anchor="middle" font-weight="bold">Ё ё</text>
    <text x="470" y="305" fill="#e0e7ff" font-size="14">/jo/</text>
    <text x="470" y="323" fill="#cbd5e1" font-size="13">ёж</text>

    <rect x="570" y="278" width="155" height="56" rx="10" fill="#4f46e5" opacity="0.7"/>
    <text x="605" y="314" fill="white" font-size="30" text-anchor="middle" font-weight="bold">Ю ю</text>
    <text x="640" y="305" fill="#e0e7ff" font-size="14">/ju/</text>
    <text x="640" y="323" fill="#cbd5e1" font-size="13">юг</text>

    <rect x="740" y="278" width="155" height="56" rx="10" fill="#4f46e5" opacity="0.7"/>
    <text x="775" y="314" fill="white" font-size="30" text-anchor="middle" font-weight="bold">И и</text>
    <text x="810" y="305" fill="#e0e7ff" font-size="14">/i/</text>
    <text x="810" y="323" fill="#cbd5e1" font-size="13">мир</text>
  </g>

  <!-- CONSONANTS SECTION -->
  <rect x="30" y="475" width="900" height="630" rx="16" fill="#111827" stroke="#22c55e" stroke-width="1.5" opacity="0.9"/>
  <text x="480" y="507" fill="#86efac" font-size="20" font-family="Arial" text-anchor="middle" font-weight="bold">Согласные — Consonants</text>

  <!-- Voiced / Unvoiced pairs -->
  <text x="480" y="535" fill="#64748b" font-size="13" font-family="Arial" text-anchor="middle">Звонкие ↔ Глухие / Voiced ↔ Unvoiced pairs</text>

  <g font-family="Arial">
    <!-- Row: Б/П -->
    <rect x="60" y="550" width="130" height="52" rx="10" fill="url(#consGrad)" opacity="0.85"/>
    <text x="90" y="583" fill="white" font-size="26" text-anchor="middle" font-weight="bold">Б б</text>
    <text x="140" y="575" fill="#d1fae5" font-size="13">/b/</text>
    <text x="140" y="592" fill="#94a3b8" font-size="12">банк</text>

    <text x="205" y="582" fill="#64748b" font-size="18" font-family="Arial" text-anchor="middle">↔</text>

    <rect x="220" y="550" width="130" height="52" rx="10" fill="#166534" opacity="0.6"/>
    <text x="250" y="583" fill="white" font-size="26" text-anchor="middle" font-weight="bold">П п</text>
    <text x="300" y="575" fill="#d1fae5" font-size="13">/p/</text>
    <text x="300" y="592" fill="#94a3b8" font-size="12">папа</text>

    <!-- Row: В/Ф -->
    <rect x="380" y="550" width="130" height="52" rx="10" fill="url(#consGrad)" opacity="0.85"/>
    <text x="410" y="583" fill="white" font-size="26" text-anchor="middle" font-weight="bold">В в</text>
    <text x="460" y="575" fill="#d1fae5" font-size="13">/v/</text>
    <text x="460" y="592" fill="#94a3b8" font-size="12">вот</text>

    <text x="525" y="582" fill="#64748b" font-size="18" text-anchor="middle">↔</text>

    <rect x="540" y="550" width="130" height="52" rx="10" fill="#166534" opacity="0.6"/>
    <text x="570" y="583" fill="white" font-size="26" text-anchor="middle" font-weight="bold">Ф ф</text>
    <text x="620" y="575" fill="#d1fae5" font-size="13">/f/</text>
    <text x="620" y="592" fill="#94a3b8" font-size="12">факт</text>

    <!-- Г/К -->
    <rect x="700" y="550" width="80" height="52" rx="10" fill="url(#consGrad)" opacity="0.85"/>
    <text x="740" y="583" fill="white" font-size="26" text-anchor="middle" font-weight="bold">Г г</text>

    <text x="790" y="582" fill="#64748b" font-size="14" text-anchor="middle">/g/↔</text>

    <rect x="805" y="550" width="90" height="52" rx="10" fill="#166534" opacity="0.6"/>
    <text x="835" y="583" fill="white" font-size="26" text-anchor="middle" font-weight="bold">К к</text>
    <text x="870" y="583" fill="#94a3b8" font-size="12">/k/</text>

    <!-- Д/Т -->
    <rect x="60" y="615" width="130" height="52" rx="10" fill="url(#consGrad)" opacity="0.85"/>
    <text x="90" y="648" fill="white" font-size="26" text-anchor="middle" font-weight="bold">Д д</text>
    <text x="140" y="640" fill="#d1fae5" font-size="13">/d/</text>
    <text x="140" y="657" fill="#94a3b8" font-size="12">дом</text>

    <text x="205" y="647" fill="#64748b" font-size="18" text-anchor="middle">↔</text>

    <rect x="220" y="615" width="130" height="52" rx="10" fill="#166534" opacity="0.6"/>
    <text x="250" y="648" fill="white" font-size="26" text-anchor="middle" font-weight="bold">Т т</text>
    <text x="300" y="640" fill="#d1fae5" font-size="13">/t/</text>
    <text x="300" y="657" fill="#94a3b8" font-size="12">там</text>

    <!-- З/С -->
    <rect x="380" y="615" width="130" height="52" rx="10" fill="url(#consGrad)" opacity="0.85"/>
    <text x="410" y="648" fill="white" font-size="26" text-anchor="middle" font-weight="bold">З з</text>
    <text x="460" y="640" fill="#d1fae5" font-size="13">/z/</text>
    <text x="460" y="657" fill="#94a3b8" font-size="12">зал</text>

    <text x="525" y="647" fill="#64748b" font-size="18" text-anchor="middle">↔</text>

    <rect x="540" y="615" width="130" height="52" rx="10" fill="#166534" opacity="0.6"/>
    <text x="570" y="648" fill="white" font-size="26" text-anchor="middle" font-weight="bold">С с</text>
    <text x="620" y="640" fill="#d1fae5" font-size="13">/s/</text>
    <text x="620" y="657" fill="#94a3b8" font-size="12">сон</text>

    <!-- Ж/Ш -->
    <rect x="700" y="615" width="80" height="52" rx="10" fill="url(#consGrad)" opacity="0.85"/>
    <text x="740" y="648" fill="white" font-size="26" text-anchor="middle" font-weight="bold">Ж ж</text>

    <text x="790" y="647" fill="#64748b" font-size="14" text-anchor="middle">/ʒ/↔</text>

    <rect x="805" y="615" width="90" height="52" rx="10" fill="#166534" opacity="0.6"/>
    <text x="835" y="648" fill="white" font-size="26" text-anchor="middle" font-weight="bold">Ш ш</text>
    <text x="870" y="648" fill="#94a3b8" font-size="12">/ʃ/</text>

    <!-- Unpaired consonants -->
    <text x="480" y="700" fill="#64748b" font-size="13" text-anchor="middle">Непарные / Unpaired consonants</text>

    <!-- М Н Л Р Й -->
    <rect x="60" y="715" width="155" height="52" rx="10" fill="#0e7490" opacity="0.7"/>
    <text x="90" y="748" fill="white" font-size="26" text-anchor="middle" font-weight="bold">М м</text>
    <text x="140" y="740" fill="#d1fae5" font-size="13">/m/</text>
    <text x="140" y="756" fill="#94a3b8" font-size="12">мáма</text>

    <rect x="230" y="715" width="155" height="52" rx="10" fill="#0e7490" opacity="0.7"/>
    <text x="260" y="748" fill="white" font-size="26" text-anchor="middle" font-weight="bold">Н н</text>
    <text x="310" y="740" fill="#d1fae5" font-size="13">/n/</text>
    <text x="310" y="756" fill="#94a3b8" font-size="12">нет</text>

    <rect x="400" y="715" width="155" height="52" rx="10" fill="#0e7490" opacity="0.7"/>
    <text x="430" y="748" fill="white" font-size="26" text-anchor="middle" font-weight="bold">Л л</text>
    <text x="480" y="740" fill="#d1fae5" font-size="13">/l/</text>
    <text x="480" y="756" fill="#94a3b8" font-size="12">лук</text>

    <rect x="570" y="715" width="155" height="52" rx="10" fill="#0e7490" opacity="0.7"/>
    <text x="600" y="748" fill="white" font-size="26" text-anchor="middle" font-weight="bold">Р р</text>
    <text x="650" y="740" fill="#d1fae5" font-size="13">/r/</text>
    <text x="650" y="756" fill="#94a3b8" font-size="12">рот</text>

    <rect x="740" y="715" width="155" height="52" rx="10" fill="#0e7490" opacity="0.7"/>
    <text x="770" y="748" fill="white" font-size="26" text-anchor="middle" font-weight="bold">Й й</text>
    <text x="820" y="740" fill="#d1fae5" font-size="13">/j/</text>
    <text x="820" y="756" fill="#94a3b8" font-size="12">мой</text>

    <!-- Х Ц Ч Щ -->
    <rect x="60" y="780" width="200" height="52" rx="10" fill="#166534" opacity="0.5"/>
    <text x="95" y="813" fill="white" font-size="26" text-anchor="middle" font-weight="bold">Х х</text>
    <text x="155" y="805" fill="#d1fae5" font-size="13">/x/</text>
    <text x="155" y="822" fill="#94a3b8" font-size="12">хлеб</text>

    <rect x="275" y="780" width="200" height="52" rx="10" fill="#166534" opacity="0.5"/>
    <text x="310" y="813" fill="white" font-size="26" text-anchor="middle" font-weight="bold">Ц ц</text>
    <text x="370" y="805" fill="#d1fae5" font-size="13">/ts/</text>
    <text x="370" y="822" fill="#94a3b8" font-size="12">центр</text>

    <rect x="490" y="780" width="200" height="52" rx="10" fill="#166534" opacity="0.5"/>
    <text x="525" y="813" fill="white" font-size="26" text-anchor="middle" font-weight="bold">Ч ч</text>
    <text x="585" y="805" fill="#d1fae5" font-size="13">/tʃ/</text>
    <text x="585" y="822" fill="#94a3b8" font-size="12">час</text>

    <rect x="705" y="780" width="200" height="52" rx="10" fill="#166534" opacity="0.5"/>
    <text x="740" y="813" fill="white" font-size="26" text-anchor="middle" font-weight="bold">Щ щ</text>
    <text x="800" y="805" fill="#d1fae5" font-size="13">/ɕː/</text>
    <text x="800" y="822" fill="#94a3b8" font-size="12">щит</text>
  </g>

  <!-- SIGNS SECTION -->
  <rect x="30" y="860" width="900" height="85" rx="16" fill="#111827" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>
  <g font-family="Arial">
    <rect x="160" y="875" width="260" height="52" rx="10" fill="url(#signGrad)" opacity="0.6"/>
    <text x="210" y="908" fill="white" font-size="26" text-anchor="middle" font-weight="bold">Ъ ъ</text>
    <text x="290" y="900" fill="#fef3c7" font-size="14">Твёрдый знак</text>
    <text x="290" y="918" fill="#94a3b8" font-size="12">Hard sign — separator</text>

    <rect x="540" y="875" width="260" height="52" rx="10" fill="url(#signGrad)" opacity="0.6"/>
    <text x="590" y="908" fill="white" font-size="26" text-anchor="middle" font-weight="bold">Ь ь</text>
    <text x="670" y="900" fill="#fef3c7" font-size="14">Мягкий знак</text>
    <text x="670" y="918" fill="#94a3b8" font-size="12">Soft sign — softens prev.</text>
  </g>

  <!-- Quick reference: Similar to Latin -->
  <rect x="30" y="965" width="900" height="170" rx="16" fill="#111827" stroke="#8b5cf6" stroke-width="1.5" opacity="0.9"/>
  <text x="480" y="997" fill="#c4b5fd" font-size="18" font-family="Arial" text-anchor="middle" font-weight="bold">⚠️ Ложные друзья — False Friends (look like Latin but different!)</text>

  <g font-family="Arial" font-size="15">
    <text x="120" y="1030" fill="white" font-weight="bold">В в</text>
    <text x="200" y="1030" fill="#94a3b8">Looks like B → sounds /v/</text>

    <text x="120" y="1055" fill="white" font-weight="bold">Н н</text>
    <text x="200" y="1055" fill="#94a3b8">Looks like H → sounds /n/</text>

    <text x="120" y="1080" fill="white" font-weight="bold">Р р</text>
    <text x="200" y="1080" fill="#94a3b8">Looks like P → sounds /r/</text>

    <text x="520" y="1030" fill="white" font-weight="bold">С с</text>
    <text x="600" y="1030" fill="#94a3b8">Looks like C → sounds /s/</text>

    <text x="520" y="1055" fill="white" font-weight="bold">У у</text>
    <text x="600" y="1055" fill="#94a3b8">Looks like Y → sounds /u/</text>

    <text x="520" y="1080" fill="white" font-weight="bold">Х х</text>
    <text x="600" y="1080" fill="#94a3b8">Looks like X → sounds /x/</text>
  </g>

  <!-- Pronunciation tip -->
  <rect x="30" y="1155" width="900" height="80" rx="16" fill="#111827" stroke="#06b6d4" stroke-width="1.5" opacity="0.9"/>
  <text x="480" y="1185" fill="#67e8f9" font-size="16" font-family="Arial" text-anchor="middle" font-weight="bold">💡 Совет / Tip</text>
  <text x="480" y="1215" fill="#94a3b8" font-size="14" font-family="Arial" text-anchor="middle">Слушай → Повторяй → Читай. Listen → Repeat → Read. Начни с гласных, потом согласные.</text>
</svg>