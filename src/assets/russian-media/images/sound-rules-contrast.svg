<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Voiced and unvoiced consonant contrast chart</title>
  <desc id="desc">Visual chart showing voiced/unvoiced consonant pairs with minimal pair examples.</desc>
  
  <defs>
    <linearGradient id="blueBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="redBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef2f2"/>
      <stop offset="100%" stop-color="#fee2e2"/>
    </linearGradient>
  </defs>
  
  <rect width="960" height="540" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="480" y="45" font-size="30" font-family="Arial" fill="#0f172a" text-anchor="middle" font-weight="bold">🔊 Звонкие и глухие — Voiced vs Unvoiced</text>
  <line x1="100" y1="60" x2="860" y2="60" stroke="#cbd5e1" stroke-width="1"/>
  
  <!-- Voiced column -->
  <rect x="40" y="80" width="420" height="420" rx="20" fill="url(#blueBg)" stroke="#2563eb" stroke-width="2"/>
  <rect x="40" y="80" width="420" height="50" rx="20" fill="#2563eb"/>
  <text x="250" y="112" fill="white" font-size="24" font-family="Arial" text-anchor="middle" font-weight="bold">🔵 Звонкие — Voiced</text>
  <text x="250" y="130" fill="#bfdbfe" font-size="14" font-family="Arial" text-anchor="middle">Vocal cords vibrate</text>
  
  <!-- Voiced pairs -->
  <g font-family="Arial">
    <!-- Б -->
    <rect x="70" y="155" width="80" height="80" rx="16" fill="#1d4ed8"/>
    <text x="110" y="210" fill="white" font-size="48" text-anchor="middle" font-weight="bold">Б</text>
    <text x="170" y="190" fill="#1e40af" font-size="20">/b/</text>
    <text x="170" y="218" fill="#334155" font-size="22">бáнк</text>
    <text x="280" y="218" fill="#64748b" font-size="16">bank</text>
    <text x="170" y="240" fill="#334155" font-size="18">ба · бо · бу · бе · би</text>
    
    <!-- Д -->
    <rect x="70" y="265" width="80" height="80" rx="16" fill="#1d4ed8"/>
    <text x="110" y="320" fill="white" font-size="48" text-anchor="middle" font-weight="bold">Д</text>
    <text x="170" y="300" fill="#1e40af" font-size="20">/d/</text>
    <text x="170" y="328" fill="#334155" font-size="22">дом</text>
    <text x="280" y="328" fill="#64748b" font-size="16">house</text>
    <text x="170" y="350" fill="#334155" font-size="18">да · до · ду · де · ди</text>
    
    <!-- Г -->
    <rect x="70" y="375" width="80" height="80" rx="16" fill="#1d4ed8"/>
    <text x="110" y="430" fill="white" font-size="48" text-anchor="middle" font-weight="bold">Г</text>
    <text x="170" y="410" fill="#1e40af" font-size="20">/g/</text>
    <text x="170" y="438" fill="#334155" font-size="22">год</text>
    <text x="280" y="438" fill="#64748b" font-size="16">year</text>
    <text x="170" y="460" fill="#334155" font-size="18">га · го · гу · ге · ги</text>
  </g>
  
  <!-- Arrow column -->
  <g font-family="Arial" fill="#94a3b8" font-size="32" text-anchor="middle">
    <text x="480" y="210">↔</text>
    <text x="480" y="320">↔</text>
    <text x="480" y="430">↔</text>
  </g>
  
  <!-- Unvoiced column -->
  <rect x="500" y="80" width="420" height="420" rx="20" fill="url(#redBg)" stroke="#dc2626" stroke-width="2"/>
  <rect x="500" y="80" width="420" height="50" rx="20" fill="#dc2626"/>
  <text x="710" y="112" fill="white" font-size="24" font-family="Arial" text-anchor="middle" font-weight="bold">🔴 Глухие — Unvoiced</text>
  <text x="710" y="130" fill="#fecaca" font-size="14" font-family="Arial" text-anchor="middle">Vocal cords relaxed</text>
  
  <!-- Unvoiced pairs -->
  <g font-family="Arial">
    <!-- П -->
    <rect x="530" y="155" width="80" height="80" rx="16" fill="#dc2626"/>
    <text x="570" y="210" fill="white" font-size="48" text-anchor="middle" font-weight="bold">П</text>
    <text x="630" y="190" fill="#991b1b" font-size="20">/p/</text>
    <text x="630" y="218" fill="#334155" font-size="22">пáрк</text>
    <text x="740" y="218" fill="#64748b" font-size="16">park</text>
    <text x="630" y="240" fill="#334155" font-size="18">па · по · пу · пе · пи</text>
    
    <!-- Т -->
    <rect x="530" y="265" width="80" height="80" rx="16" fill="#dc2626"/>
    <text x="570" y="320" fill="white" font-size="48" text-anchor="middle" font-weight="bold">Т</text>
    <text x="630" y="300" fill="#991b1b" font-size="20">/t/</text>
    <text x="630" y="328" fill="#334155" font-size="22">там</text>
    <text x="740" y="328" fill="#64748b" font-size="16">there</text>
    <text x="630" y="350" fill="#334155" font-size="18">та · то · ту · те · ти</text>
    
    <!-- К -->
    <rect x="530" y="375" width="80" height="80" rx="16" fill="#dc2626"/>
    <text x="570" y="430" fill="white" font-size="48" text-anchor="middle" font-weight="bold">К</text>
    <text x="630" y="410" fill="#991b1b" font-size="20">/k/</text>
    <text x="630" y="438" fill="#334155" font-size="22">кот</text>
    <text x="740" y="438" fill="#64748b" font-size="16">cat</text>
    <text x="630" y="460" fill="#334155" font-size="18">ка · ко · ку · ке · ки</text>
  </g>
  
  <!-- Tip box -->
  <rect x="100" y="510" width="760" height="24" rx="8" fill="#fef3c7"/>
  <text x="480" y="528" fill="#92400e" font-size="15" font-family="Arial" text-anchor="middle">💡 Tip: Place your hand on your throat — voiced letters vibrate, unvoiced do not!</text>
</svg>